<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Generator</title>
    <style>
        :root {
            --bg: #f7efe5;
            --panel: rgba(255, 252, 247, 0.88);
            --text: #1f2937;
            --muted: #5f6b7a;
            --accent: #d97706;
            --accent-dark: #9a3412;
            --line: rgba(31, 41, 55, 0.12);
            --success: #166534;
            --shadow: 0 24px 60px rgba(146, 64, 14, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at top left, rgba(217, 119, 6, 0.25), transparent 30%),
                radial-gradient(circle at bottom right, rgba(234, 88, 12, 0.22), transparent 28%),
                linear-gradient(135deg, #fff9f2, var(--bg));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: min(100%, 460px);
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.65);
            border-radius: 28px;
            padding: 32px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--accent-dark);
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.75rem;
            font-weight: 700;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 2.9rem);
            line-height: 1;
        }

        .subtitle {
            margin: 14px 0 26px;
            color: var(--muted);
            line-height: 1.6;
        }

        .otp-box {
            border: 1px solid var(--line);
            border-radius: 22px;
            padding: 22px 18px;
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
        }

        #otpDisplay {
            display: block;
            font-size: clamp(2rem, 8vw, 3.4rem);
            letter-spacing: 0.28em;
            font-weight: 800;
            color: var(--accent-dark);
            min-height: 1.3em;
        }

        .meta {
            margin-top: 14px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .controls {
            margin: 24px 0 20px;
            display: grid;
            gap: 16px;
        }

        .field {
            border: 1px solid var(--line);
            border-radius: 18px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.65);
        }

        .field label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        button {
            border: 0;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .primary {
            color: white;
            background: linear-gradient(135deg, var(--accent), #ea580c);
            box-shadow: 0 16px 28px rgba(217, 119, 6, 0.28);
        }

        .secondary {
            color: var(--accent-dark);
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(154, 52, 18, 0.12);
        }

        .tip {
            margin: 18px 0 0;
            font-size: 0.95rem;
            color: var(--success);
            min-height: 1.2em;
        }

        .footer {
            margin-top: 20px;
            color: var(--muted);
            font-size: 0.9rem;
            text-align: center;
        }

        @media (max-width: 520px) {
            .card {
                padding: 24px 18px;
                border-radius: 22px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            #otpDisplay {
                letter-spacing: 0.18em;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="eyebrow">Secure Code Tool</p>
        <h1>OTP Generator</h1>
        <p class="subtitle">
            Generate a fresh numeric OTP instantly, choose its length, and copy it with one click.
        </p>

        <section class="otp-box" aria-label="Generated OTP">
            <span id="otpDisplay">------</span>
            <div class="meta">
                Valid for <strong><span id="timer">30</span>s</strong> after generation
            </div>
        </section>

        <section class="controls">
            <div class="field">
                <label for="lengthRange">
                    OTP Length
                    <span id="lengthValue">6 digits</span>
                </label>
                <input id="lengthRange" type="range" min="4" max="8" value="6">
            </div>
        </section>

        <div class="actions">
            <button class="primary" id="generateBtn" type="button">Generate OTP</button>
            <button class="secondary" id="copyBtn" type="button">Copy OTP</button>
        </div>

        <p class="tip" id="statusText" aria-live="polite"></p>
        <p class="footer">Standalone page created separately so your existing file stays unchanged.</p>
    </main>

    <script>
        const otpDisplay = document.getElementById("otpDisplay");
        const timerText = document.getElementById("timer");
        const statusText = document.getElementById("statusText");
        const lengthRange = document.getElementById("lengthRange");
        const lengthValue = document.getElementById("lengthValue");
        const generateBtn = document.getElementById("generateBtn");
        const copyBtn = document.getElementById("copyBtn");

        let currentOtp = "";
        let countdown = 30;
        let timerId = null;

        function updateLengthLabel() {
            lengthValue.textContent = `${lengthRange.value} digits`;
        }

        function createOtp(length) {
            let otp = "";
            for (let i = 0; i < length; i += 1) {
                otp += Math.floor(Math.random() * 10);
            }
            return otp;
        }

        function clearTimer() {
            if (timerId) {
                clearInterval(timerId);
                timerId = null;
            }
        }

        function startTimer() {
            clearTimer();
            countdown = 30;
            timerText.textContent = countdown;

            timerId = setInterval(() => {
                countdown -= 1;
                timerText.textContent = countdown;

                if (countdown <= 0) {
                    clearTimer();
                    currentOtp = "";
                    otpDisplay.textContent = "Expired";
                    statusText.textContent = "OTP expire ho gaya. Naya OTP generate karein.";
                }
            }, 1000);
        }

        function generateOtp() {
            currentOtp = createOtp(Number(lengthRange.value));
            otpDisplay.textContent = currentOtp;
            statusText.textContent = "Naya OTP generate ho gaya.";
            startTimer();
        }

        async function copyOtp() {
            if (!currentOtp) {
                statusText.textContent = "Pehle OTP generate karein.";
                return;
            }

            try {
                await navigator.clipboard.writeText(currentOtp);
                statusText.textContent = "OTP clipboard mein copy ho gaya.";
            } catch (error) {
                statusText.textContent = "Copy allow nahi hua. OTP manually copy karein.";
            }
        }

        lengthRange.addEventListener("input", updateLengthLabel);
        generateBtn.addEventListener("click", generateOtp);
        copyBtn.addEventListener("click", copyOtp);

        updateLengthLabel();
    </script>
</body>
</html>
